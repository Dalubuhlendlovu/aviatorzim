services:
  - type: web
    name: aviator-zim-backend
    runtime: node
    rootDir: apps/server
    buildCommand: >
      corepack pnpm install --frozen-lockfile &&
      corepack pnpm --filter @aviator-zim/server build &&
      corepack pnpm --filter @aviator-zim/server prisma:migrate:deploy
    startCommand: corepack pnpm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: aviator-zim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production

databases:
  - name: aviator-zim-db
    databaseName: aviator_zim
    region: frankfurt
